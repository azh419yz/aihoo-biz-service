server:
  port: 8081
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/internet_hospital?useUnicode=true&characterEncoding=utf8&useSSL=false
    username: admin
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      database: 0
      host: 127.0.0.1
      password: password
      port: 6379
      timeout: 10000
      block-when-exhausted: true
      jedis:
        pool:
          max-active: 1000
          max-wait: 10000
          min-idle: 1
          max-idle: 100
logging:
  config: classpath:logback-spring.xml
  level:
    root: debug
